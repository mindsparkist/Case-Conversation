<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Formatter</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* The Main Input */
        input {
            width: 90%;
            max-width: 800px;
            border: none;
            outline: none;
            background: transparent;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            color: #1a1a1a;
            text-align: center;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #eeeeee;
            font-weight: 300;
        }

        /* Minimalist Copy Button */
        #copyBtn {
            margin-top: 20px;
            padding: 8px 16px;
            font-size: 0.9rem;
            color: #999;
            background: none;
            border: 1px solid #eee;
            border-radius: 20px;
            cursor: pointer;
            opacity: 0; /* Hidden by default */
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #copyBtn.visible {
            opacity: 1;
        }

        #copyBtn:hover {
            color: #000;
            border-color: #000;
        }

        #copyBtn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <input type="text" id="nameInput" placeholder="Enter Name" spellcheck="false" autocomplete="off">
    <button id="copyBtn">Copy</button>

    <script>
        const input = document.getElementById('nameInput');
        const copyBtn = document.getElementById('copyBtn');
        let timeout = null;

        input.addEventListener('input', () => {
            clearTimeout(timeout);
            
            timeout = setTimeout(() => {
                const rawValue = input.value;
                
                if (rawValue.trim().length > 0) {
                    // Standard Formatting: Sarah Jane Smith
                    const formatted = rawValue
                        .toLowerCase()
                        .split(/\s+/)
                        .filter(word => word.length > 0)
                        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                        .join(" ");

                    input.value = formatted;
                    copyBtn.classList.add('visible');
                } else {
                    copyBtn.classList.remove('visible');
                }
            }, 300);
        });

        // Copy Functionality
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(input.value).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = 'Copied!';
                copyBtn.style.color = '#27ae60';
                copyBtn.style.borderColor = '#27ae60';
                
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.style.color = '';
                    copyBtn.style.borderColor = '';
                }, 1500);
            });
        });
    </script>
</body>
</html>
